name: Steam Discussion Replies

on:
  workflow_call:       # Called directly from steam-discussions workflow
  workflow_dispatch:   # Manual trigger for re-runs or standalone use

jobs:
  scrape-replies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Run script
        run: node steam-discussion-replies.js
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
