name: Daily Game Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * *'

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Run script
        run: node daily-game-snapshot.js
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GAMALYTIC_API_KEY: ${{ secrets.GAMALYTIC_API_KEY }}
          SCRAPER_SUPABASE_URL: ${{ secrets.SCRAPER_SUPABASE_URL }}
          SCRAPER_SUPABASE_KEY: ${{ secrets.SCRAPER_SUPABASE_KEY }}
